version: '3.8'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: feedback-widget-mongo-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: feedbackwidget
    volumes:
      - mongodb_prod_data:/data/db
    networks:
      - feedback-widget-prod
    # Security: Don't expose MongoDB port in production
    # ports:
    #   - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: feedback-widget-backend-prod
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - feedback-widget-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: feedback-widget-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - feedback-widget-prod

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.prod
    container_name: feedback-widget-landing-prod
    restart: unless-stopped
    env_file:
      - ./landing/.env.production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - feedback-widget-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_prod_data:

networks:
  feedback-widget-prod:
    driver: bridge